another_published_post:
  title: "JavaScript and Rails Integration"
  content: |
    # JavaScript and Rails Integration
    
    Learn how to integrate JavaScript with your Rails application using Stimulus and Turbo.
    
    ## Hotwire Components
    
    - **Turbo**: Fast navigation without full page reloads
    - **Stimulus**: Modest JavaScript framework
    
    ```javascript
    import { Controller } from "@hotwired/stimulus"
    
    export default class extends Controller {
      connect() {
        console.log("Hello from Stimulus!")
      }
    }
    ```
  excerpt: "Discover how to use Hotwire to create dynamic Rails applications."
  published: true
  published_at: <%= 3.days.ago %>
  slug: "javascript-and-rails-integration"

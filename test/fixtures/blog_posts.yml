  title: "Getting Started with Ruby on Rails"
  content: |
    # Getting Started with Ruby on Rails
    
    Ruby on Rails is a powerful web application framework that makes development fast and fun.
    
    ## Key Features
    
    - Convention over Configuration
    - DRY (Don't Repeat Yourself)
    - MVC Architecture
    - Active Record ORM
    
    ```ruby
    class User < ApplicationRecord
      has_many :posts
    end
    ```
    
    This is a great framework for building modern web applications.
  excerpt: "Learn the basics of Ruby on Rails framework and why it's great for web development."

# Development uses solid_cable (PostgreSQL-backed) to support multi-process:
# background workers (bin/jobs) can broadcast to the web process, and Career Architect
# Turbo Streams work correctly. The async adapter only works within a single process.
development:
  adapter: solid_cable
  connects_to:
    database:
      writing: cable
  polling_interval: 0.1.seconds
  message_retention: 1.day

test:
  adapter: test

production:
  adapter: solid_cable
  connects_to:
    database:
      writing: cable
  polling_interval: 0.1.seconds
  message_retention: 1.day
